name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Immutable vX.Y.Z tag whose source is built and promoted"
        required: true
        type: string
      include_protected_platform_evidence:
        description: "Attach verified Linux i386/armhf and Windows XP evidence assets after the core release"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SOURCE_DATE_EPOCH: "1704067200"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONHASHSEED: "0"
  # Manual dispatch keeps its explicit tag; tag pushes publish that tag directly.
  RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}

jobs:
  release-preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false
          clean: true
          fetch-depth: 0
      - name: Require trusted release source
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            test "${{ github.ref_type }}" = "tag"
            test "${{ github.ref_name }}" = "$RELEASE_TAG"
          else
            test "${{ github.ref_name }}" = "${{ github.event.repository.default_branch }}"
          fi
          git fetch --no-tags origin "${{ github.event.repository.default_branch }}"
          git merge-base --is-ancestor HEAD "origin/${{ github.event.repository.default_branch }}"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Require release tag and project version match
        run: python scripts/check_release_version.py --release-tag "$RELEASE_TAG"
      - name: Run release preflight verifier
        run: python scripts/verify.py --quick --no-cli-smoke --release-tag "$RELEASE_TAG"
      - name: Report protected platform readiness requirements
        run: python scripts/check_protected_platform_goal.py --release-tag "$RELEASE_TAG" --show-requirements
      - name: Require clean release checkout
        run: python scripts/check_repository_cleanup.py --require-clean

  source-and-python:
    needs: release-preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false
          clean: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install release build tools
        run: python -m pip install --constraint requirements-release.txt pip setuptools wheel build
      - name: Build source and Python package assets
        run: python scripts/make_release.py
      - uses: actions/upload-artifact@v7
        with:
          name: release-source-python
          path: dist/*
          if-no-files-found: error

  windows-native:
    needs: release-preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            python-architecture: x64
            runner: windows-latest
          - arch: x86
            python-architecture: x86
            runner: windows-latest
          - arch: arm64
            python-architecture: arm64
            runner: windows-11-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false
          clean: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          architecture: ${{ matrix.python-architecture }}
      - name: Install Python packaging dependencies
        shell: powershell
        run: |
          $ExpectedOpenSsl = ""
          if ("${{ matrix.arch }}" -eq "x86") {
            python -m pip install --only-binary=cryptography --constraint requirements-release-compat.txt pip setuptools wheel ".[security,package]"
            $ExpectedCryptography = "48.0.1"
          } elseif ("${{ matrix.arch }}" -eq "arm64") {
            if (-not $env:VCPKG_INSTALLATION_ROOT) {
              throw "windows-11-arm runner did not provide VCPKG_INSTALLATION_ROOT"
            }
            $VcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
            $VcpkgCommit = "42e4e33e1505c9f47b58c21e0f557c1571b751ee"
            git -C $VcpkgRoot fetch --no-tags --depth 1 origin $VcpkgCommit
            git -C $VcpkgRoot checkout --detach $VcpkgCommit
            if ((git -C $VcpkgRoot rev-parse HEAD).Trim() -ne $VcpkgCommit) {
              throw "vcpkg checkout did not resolve to the pinned commit"
            }
            & (Join-Path $VcpkgRoot "bootstrap-vcpkg.bat") -disableMetrics
            if ($LASTEXITCODE -ne 0) { throw "vcpkg bootstrap failed" }
            $Vcpkg = Join-Path $VcpkgRoot "vcpkg.exe"
            & $Vcpkg install "openssl:arm64-windows-static-md" --clean-after-build
            if ($LASTEXITCODE -ne 0) { throw "ARM64 OpenSSL installation failed" }
            $OpenSslRoot = Join-Path $VcpkgRoot "installed\arm64-windows-static-md"
            foreach ($RequiredPath in @(
              "include\openssl\opensslv.h",
              "lib\libcrypto.lib",
              "lib\libssl.lib"
            )) {
              if (-not (Test-Path (Join-Path $OpenSslRoot $RequiredPath))) {
                throw "ARM64 OpenSSL output missing: $RequiredPath"
              }
            }
            $env:OPENSSL_DIR = $OpenSslRoot
            $env:OPENSSL_STATIC = "1"
            $env:OPENSSL_NO_VENDOR = "1"
            python -m pip install --constraint requirements-release.txt pip setuptools wheel maturin cffi pycparser
            python -m pip install --no-cache-dir --no-build-isolation --no-binary=cryptography --constraint requirements-release.txt ".[desktop,security,package]"
            $ExpectedCryptography = "49.0.0"
            $ExpectedOpenSsl = "OpenSSL 3.6.3"
          } else {
            python -m pip install --only-binary=cryptography --constraint requirements-release.txt pip setuptools wheel ".[desktop,security,package]"
            $ExpectedCryptography = "49.0.0"
          }
          python -c "import cryptography; from cryptography.hazmat.backends.openssl.backend import backend; actual_openssl = backend.openssl_version_text(); assert cryptography.__version__ == '$ExpectedCryptography'; assert not '$ExpectedOpenSsl' or actual_openssl.startswith('$ExpectedOpenSsl'), actual_openssl; print(f'cryptography={cryptography.__version__} openssl={actual_openssl}')"
      - name: Install Windows installer toolchains
        shell: powershell
        run: |
          if (-not (Get-Command "iscc.exe" -ErrorAction SilentlyContinue) -and -not (Test-Path "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe")) {
            choco install innosetup --version=6.3.3 -y --no-progress
          } else {
            Write-Host "Inno Setup compiler already available"
          }
          dotnet tool install --global wix --version 5.0.2
      - name: Build Windows EXE and MSI installers
        shell: powershell
        run: .\scripts\make_windows_native.ps1 -Arch "${{ matrix.arch }}"
      - name: Run Windows native installer smoke tests
        shell: powershell
        timeout-minutes: 20
        run: .\scripts\smoke_windows_native.ps1 -Arch "${{ matrix.arch }}" -Dist "native-dist\windows"
      - uses: actions/upload-artifact@v7
        with:
          name: release-windows-native-${{ matrix.arch }}
          path: native-dist/windows/*
          if-no-files-found: error

  macos-native:
    needs: release-preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
          - arch: arm64
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false
          clean: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Python packaging dependencies
        run: |
          if [[ "${{ matrix.arch }}" == "x64" ]]; then
            python -m pip install --only-binary=cryptography --constraint requirements-release-compat.txt pip setuptools wheel ".[desktop,security,package]"
            expected_cryptography="48.0.1"
          else
            python -m pip install --only-binary=cryptography --constraint requirements-release.txt pip setuptools wheel ".[desktop,security,package]"
            expected_cryptography="49.0.0"
          fi
          EXPECTED_CRYPTOGRAPHY="$expected_cryptography" python -c "import os, cryptography; from cryptography.hazmat.backends.openssl.backend import backend; assert cryptography.__version__ == os.environ['EXPECTED_CRYPTOGRAPHY']; print(f'cryptography={cryptography.__version__} openssl={backend.openssl_version_text()}')"
      - name: Build macOS DMG and PKG installers
        run: EXPECTED_ARTIFACT_ARCH="${{ matrix.arch }}" bash scripts/make_macos_native.sh
      - name: Run macOS native installer smoke tests
        run: bash scripts/smoke_macos_native.sh --arch "${{ matrix.arch }}" --dist native-dist/macos
      - uses: actions/upload-artifact@v7
        with:
          name: release-macos-native-${{ matrix.arch }}
          path: native-dist/macos/*
          if-no-files-found: error

  linux-native:
    needs: release-preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          persist-credentials: false
          clean: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Linux packaging toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm
      - name: Install Python packaging dependencies
        run: |
          python -m pip install --only-binary=cryptography --constraint requirements-release.txt pip setuptools wheel ".[security,package]"
          python -c "import cryptography; from cryptography.hazmat.backends.openssl.backend import backend; assert cryptography.__version__ == '49.0.0'; print(f'cryptography={cryptography.__version__} openssl={backend.openssl_version_text()}')"
      - name: Build Linux DEB, RPM and AppImage packages
        run: TARGET_ARCH="${{ matrix.arch }}" bash scripts/make_linux_native.sh
      - name: Run Linux native installer smoke tests
        run: bash scripts/smoke_linux_native.sh --arch "${{ matrix.arch }}" --dist native-dist/linux
      - uses: actions/upload-artifact@v7
        with:
          name: release-linux-native-${{ matrix.arch }}
          path: native-dist/linux/*
          if-no-files-found: error

  accepted-platform-evidence-assets:
    needs: release-preflight
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.include_protected_platform_evidence }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          clean: true
      - name: Check out immutable release source for evidence binding
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}
          path: release-source
          persist-credentials: false
          clean: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Require protected platform workflows at release source ref
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/check_platform_evidence_source_ref.py --repository "${{ github.repository }}" --release-tag "$RELEASE_TAG" --require-goal-targets
      - name: Require protected platform accepted records
        run: python scripts/check_protected_platform_goal.py --release-tag "$RELEASE_TAG" --require-records-complete --show-requirements
      - name: Require protected platform evidence
        run: python scripts/check_platform_verified_evidence.py --require-goal-targets --require-review-bundles --release-tag "$RELEASE_TAG"
      - name: Import accepted protected platform evidence artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/import_platform_evidence_artifacts.py --release-tag "$RELEASE_TAG" --release-head-sha "$(git -C release-source rev-parse HEAD)" --require-goal-targets --out-dir release-assets --verify-source-run --repository "${{ github.repository }}"
      - name: Validate imported protected platform review bundles
        run: python scripts/check_platform_review_bundle_artifacts.py --bundle-dir release-assets --require-goal-targets --release-tag "$RELEASE_TAG" --require-final-record-assets
      - uses: actions/upload-artifact@v7
        with:
          name: release-platform-evidence-assets
          path: release-assets/*
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 90

  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    needs:
      - release-preflight
      - source-and-python
      - windows-native
      - macos-native
      - linux-native
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          clean: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true
      - name: Validate release publish assets
        run: python scripts/check_release_publish_assets.py --assets-dir release-assets --tag "$RELEASE_TAG" --repository "${{ github.repository }}"
      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          fail_on_unmatched_files: true
          files: release-assets/**
  publish-protected-platform-evidence:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.include_protected_platform_evidence }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    needs:
      - publish
      - accepted-platform-evidence-assets
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          clean: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true
      - name: Require protected platform release assets
        run: python scripts/check_protected_platform_goal.py --release-tag "$RELEASE_TAG" --require-complete --assets-dir release-assets --repository "${{ github.repository }}"
      - name: Validate protected release publish assets
        run: python scripts/check_release_publish_assets.py --assets-dir release-assets --tag "$RELEASE_TAG" --repository "${{ github.repository }}" --require-platform-goal-targets
      - name: Upload protected platform evidence assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          fail_on_unmatched_files: true
          files: release-assets/**
      - name: Audit published protected platform evidence
        env:
          GH_TOKEN: ${{ github.token }}
        run: python scripts/check_platform_release_evidence_remote.py --repository "${{ github.repository }}" --release-tag "$RELEASE_TAG" --require-goal-targets --require-source-runs --require-source-artifact-bytes --require-final-record-bytes --require-release-asset-bytes --require-tag-source-head
