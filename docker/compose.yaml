services:
  remote-ops-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "127.0.0.1:8765:8765"
    restart: unless-stopped
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "3"
    init: true
    environment:
      ROW_HOME: /data
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    pids_limit: 128
    mem_limit: 256m
    volumes:
      - remote-ops-data:/data
volumes:
  remote-ops-data:
