name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025-vs2026, macos-15-intel]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Purge pip cache
        run: python -m pip cache purge
        continue-on-error: true
      - name: Install
        env:
          PIP_NO_CACHE_DIR: "1"
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[security,dev]"
      - name: Compile
        run: python -m compileall src
      - name: Tests
        run: pytest -q
      - name: CLI smoke
        run: |
          row init
          row profile list
          row connect example-ssh --dry-run
          row doctor --json
