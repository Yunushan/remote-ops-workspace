name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025-vs2026, macos-15-intel]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Purge pip cache
        run: python -m pip cache purge
        continue-on-error: true
      - name: Install
        env:
          PIP_NO_CACHE_DIR: "1"
        run: |
          python -m pip install -e ".[security,dev]"
      - name: Verify
        run: python scripts/verify.py --lint

  gui-render:
    name: Real PyQt6 GUI render
    runs-on: ubuntu-latest
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_CACHE_DIR: "1"
      QT_QPA_PLATFORM: "offscreen"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install Linux Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxext6 \
            libxrender1
      - name: Install desktop verification dependencies
        run: python -m pip install -e ".[desktop,security,dev]"
      - name: Real GUI render smoke
        run: python scripts/check_real_gui_render.py --require-pyqt6 --out-dir artifacts/gui-real
      - uses: actions/upload-artifact@v7
        with:
          name: gui-real-render
          path: artifacts/gui-real/*
          if-no-files-found: error
