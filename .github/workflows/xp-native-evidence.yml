name: xp-native-evidence

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Windows XP native evidence target"
        required: true
        type: choice
        options:
          - windows-xp-native-x86
          - windows-xp-native-x64
      release_tag:
        description: "Release tag to validate, for example v1.0.7"
        required: true
        type: string
      release_asset_base_url:
        description: "GitHub release download base URL ending in /releases/download/vX.Y.Z"
        required: true
        type: string
      assets_dir:
        description: "Workspace-relative target/release-scoped directory containing XP native release artifacts"
        required: true
        type: string
      evidence_file:
        description: "Workspace-relative target/release-scoped XP evidence JSON file"
        required: true
        type: string
      evidence_dir:
        description: "Workspace-relative target/release-scoped directory containing XP smoke evidence files"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: xp-native-evidence-${{ inputs.target }}-${{ inputs.release_tag }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SOURCE_DATE_EPOCH: "1704067200"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONHASHSEED: "0"

jobs:
  xp-native-evidence:
    runs-on: [self-hosted, xp-evidence]
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
          clean: true
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Record XP evidence collector boundary
        run: python -c "print('XP evidence collector validates staged proof captured on real Windows XP hosts; run scripts/xp_smoke_runner.cmd after this workflow starts so smoke proof binds the printed source run metadata.')"
      - name: Validate XP evidence dispatch inputs
        run: python scripts/check_xp_native_evidence_dispatch_inputs.py --target "${{ inputs.target }}" --release-tag "${{ inputs.release_tag }}" --release-asset-base-url "${{ inputs.release_asset_base_url }}" --workflow-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" --workflow-ref-name "${{ github.ref_name }}" --source-head-sha "${{ github.sha }}" --source-run-attempt "${{ github.run_attempt }}" --assets-dir "${{ inputs.assets_dir }}" --evidence-file "${{ inputs.evidence_file }}" --evidence-dir "${{ inputs.evidence_dir }}"
      - name: Create XP evidence output directory
        run: python -c "from pathlib import Path; Path('xp-evidence-output/${{ inputs.target }}/${{ inputs.release_tag }}').mkdir(parents=True, exist_ok=True)"
      - name: Print XP evidence capture source metadata
        run: |
          echo "XP evidence source workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "XP evidence source head SHA: ${{ github.sha }}"
          echo "XP evidence source run attempt: ${{ github.run_attempt }}"
      - name: Wait for staged XP evidence inputs
        run: python scripts/wait_for_xp_native_evidence_inputs.py --assets-dir "${{ inputs.assets_dir }}" --evidence-file "${{ inputs.evidence_file }}" --evidence-dir "${{ inputs.evidence_dir }}" --timeout-seconds 2700 --poll-seconds 10 --stable-polls 2
      - name: Validate XP native evidence
        run: python scripts/check_xp_native_evidence.py --evidence "${{ inputs.evidence_file }}" --assets-dir "${{ inputs.assets_dir }}" --evidence-dir "${{ inputs.evidence_dir }}"
      - name: Validate XP promotion artifacts
        run: python scripts/check_platform_promotion_artifacts.py --target "${{ inputs.target }}" --assets-dir "${{ inputs.assets_dir }}" --tag "${{ inputs.release_tag }}" --strict
      - name: Preflight XP local platform goal evidence
        run: python scripts/check_platform_goal_local_evidence.py --root . --release-tag "${{ inputs.release_tag }}" --target "${{ inputs.target }}" --assets-dir "${{ inputs.assets_dir }}" --repository "${{ github.repository }}" --xp-evidence "${{ inputs.evidence_file }}" --xp-evidence-dir "${{ inputs.evidence_dir }}" --xp-source-workflow-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" --xp-source-head-sha "${{ github.sha }}" --xp-source-run-attempt "${{ github.run_attempt }}"
      - name: Generate XP accepted-evidence candidate
        run: python scripts/make_platform_verified_evidence_record.py --target "${{ inputs.target }}" --release-tag "${{ inputs.release_tag }}" --assets-dir "${{ inputs.assets_dir }}" --release-asset-base-url "${{ inputs.release_asset_base_url }}" --release-source-workflow-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" --release-source-artifact-name "xp-native-evidence-${{ inputs.target }}-${{ inputs.release_tag }}" --release-source-head-sha "${{ github.sha }}" --release-source-run-attempt "${{ github.run_attempt }}" --local-evidence-root . --staged-upload-out-dir "platform-evidence-upload/${{ inputs.target }}/${{ inputs.release_tag }}" --xp-evidence "${{ inputs.evidence_file }}" --xp-evidence-dir "${{ inputs.evidence_dir }}" --xp-evidence-output-dir "xp-evidence-output/${{ inputs.target }}/${{ inputs.release_tag }}" --out "xp-evidence-output/${{ inputs.target }}/${{ inputs.release_tag }}/platform-verified-evidence-${{ inputs.target }}.json"
      - name: Package XP review evidence bundle
        run: python scripts/make_xp_native_evidence_bundle.py --target "${{ inputs.target }}" --evidence "${{ inputs.evidence_file }}" --candidate-record "xp-evidence-output/${{ inputs.target }}/${{ inputs.release_tag }}/platform-verified-evidence-${{ inputs.target }}.json" --assets-dir "${{ inputs.assets_dir }}" --evidence-dir "${{ inputs.evidence_dir }}" --out-dir "xp-evidence-output/${{ inputs.target }}/${{ inputs.release_tag }}"
      - name: Finalize XP accepted-evidence candidate
        run: python scripts/finalize_platform_verified_evidence_record.py --candidate-record "xp-evidence-output/${{ inputs.target }}/${{ inputs.release_tag }}/platform-verified-evidence-${{ inputs.target }}.json" --bundle-manifest "xp-evidence-output/${{ inputs.target }}/${{ inputs.release_tag }}/xp-native-evidence-bundle-${{ inputs.target }}-${{ inputs.release_tag }}.json" --bundle-archive "xp-evidence-output/${{ inputs.target }}/${{ inputs.release_tag }}/xp-native-evidence-bundle-${{ inputs.target }}-${{ inputs.release_tag }}.zip" --bundle-sha256s "xp-evidence-output/${{ inputs.target }}/${{ inputs.release_tag }}/xp-native-evidence-bundle-${{ inputs.target }}-${{ inputs.release_tag }}-SHA256SUMS.txt" --out "xp-evidence-output/${{ inputs.target }}/${{ inputs.release_tag }}/platform-verified-evidence-${{ inputs.target }}-final.json"
      - name: Stage scoped XP evidence upload
        run: python scripts/stage_xp_native_evidence_upload.py --target "${{ inputs.target }}" --release-tag "${{ inputs.release_tag }}" --assets-dir "${{ inputs.assets_dir }}" --evidence-output-dir "xp-evidence-output/${{ inputs.target }}/${{ inputs.release_tag }}" --out-dir "platform-evidence-upload/${{ inputs.target }}/${{ inputs.release_tag }}" --force
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: xp-native-evidence-${{ inputs.target }}-${{ inputs.release_tag }}
          path: platform-evidence-upload/${{ inputs.target }}/${{ inputs.release_tag }}/*
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 90
