name: extended-platform-evidence

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Extended platform target to build and validate"
        required: true
        type: choice
        options:
          - linux-i386
          - linux-armhf
      release_tag:
        description: "Release tag to validate, for example v1.0.2"
        required: true
        type: string
      release_asset_base_url:
        description: "GitHub release download base URL ending in /releases/download/vX.Y.Z"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: extended-platform-evidence-${{ inputs.target }}-${{ inputs.release_tag }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  SOURCE_DATE_EPOCH: "1704067200"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONHASHSEED: "0"

jobs:
  linux-i386-native-evidence:
    if: ${{ inputs.target == 'linux-i386' }}
    runs-on: [self-hosted, linux, i386]
    timeout-minutes: 90
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          clean: true
      - name: Validate Linux i386 evidence dispatch inputs
        run: |
          set -euo pipefail
          python3 scripts/check_extended_platform_dispatch_inputs.py \
            --target linux-i386 \
            --release-tag "${{ inputs.release_tag }}" \
            --release-asset-base-url "${{ inputs.release_asset_base_url }}" \
            --workflow-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --workflow-ref-name "${{ github.ref_name }}" \
            --source-head-sha "${{ github.sha }}" \
            --source-run-attempt "${{ github.run_attempt }}"
      - name: Check Linux i386 builder identity
        run: |
          set -euo pipefail
          mkdir -p native-dist/linux platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/artifacts
          python3 scripts/check_extended_platform_builder.py \
            --target linux-i386 \
            --release-tag "${{ inputs.release_tag }}" \
            --workflow-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --workflow-run-attempt "${{ github.run_attempt }}" \
            --source-head-sha "${{ github.sha }}" \
            --out platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/builder-identity-linux-i386.json
      - name: Create isolated release environment
        run: |
          set -euo pipefail
          python3 -m venv .venv-native
          . .venv-native/bin/activate
          python -m pip install --constraint requirements-release.txt pip setuptools wheel ".[security,package]"
      - name: Build Linux i386 native artifacts
        run: |
          set -euo pipefail
          . .venv-native/bin/activate
          TARGET_ARCH=i386 PYTHON_BIN=.venv-native/bin/python bash scripts/make_linux_native.sh
      - name: Smoke Linux i386 native artifacts
        run: |
          set -euo pipefail
          bash scripts/smoke_linux_native.sh --arch i386 --dist native-dist/linux --target linux-i386 --workflow-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" --workflow-run-attempt "${{ github.run_attempt }}" --source-head-sha "${{ github.sha }}" --builder-evidence platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/builder-identity-linux-i386.json 2>&1 | tee platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/native-smoke-linux-i386.log
      - name: Stage Linux i386 target artifacts
        run: |
          set -euo pipefail
          mkdir -p platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/artifacts
          cp native-dist/linux/remote-ops-workspace-${{ inputs.release_tag }}-linux-i386.deb platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/artifacts/
          cp native-dist/linux/remote-ops-workspace-${{ inputs.release_tag }}-linux-i686.rpm platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/artifacts/
          cp native-dist/linux/remote-ops-workspace-${{ inputs.release_tag }}-linux-i686.AppImage platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/artifacts/
          cp native-dist/linux/remote-ops-workspace-${{ inputs.release_tag }}-linux-i686-native.tar.gz platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/artifacts/
          cp native-dist/linux/remote-ops-workspace-${{ inputs.release_tag }}-linux-i686-native-manifest.json platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/artifacts/
          cp native-dist/linux/remote-ops-workspace-${{ inputs.release_tag }}-linux-i686-native-SHA256SUMS.txt platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/artifacts/
      - name: Validate Linux i386 promotion artifacts
        run: |
          set -euo pipefail
          . .venv-native/bin/activate
          python scripts/check_platform_promotion_artifacts.py --target linux-i386 --assets-dir platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/artifacts --tag "${{ inputs.release_tag }}" --strict
      - name: Preflight Linux i386 local platform goal evidence
        run: |
          set -euo pipefail
          . .venv-native/bin/activate
          python scripts/check_platform_goal_local_evidence.py \
            --root platform-evidence-staging \
            --release-tag "${{ inputs.release_tag }}" \
            --target linux-i386 \
            --assets-dir platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/artifacts \
            --linux-builder-evidence platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/builder-identity-linux-i386.json \
            --linux-smoke-evidence platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/native-smoke-linux-i386.log \
            --linux-workflow-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --linux-source-head-sha "${{ github.sha }}" \
            --linux-source-run-attempt "${{ github.run_attempt }}"
      - name: Generate Linux i386 accepted-evidence candidate
        run: |
          set -euo pipefail
          . .venv-native/bin/activate
          python scripts/make_platform_verified_evidence_record.py \
            --target linux-i386 \
            --release-tag "${{ inputs.release_tag }}" \
            --assets-dir platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/artifacts \
            --release-asset-base-url "${{ inputs.release_asset_base_url }}" \
            --workflow-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --release-source-artifact-name extended-linux-evidence-linux-i386-${{ inputs.release_tag }} \
            --release-source-head-sha "${{ github.sha }}" \
            --release-source-run-attempt "${{ github.run_attempt }}" \
            --builder-evidence platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/builder-identity-linux-i386.json \
            --linux-smoke-evidence platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/native-smoke-linux-i386.log \
            --local-evidence-root platform-evidence-staging \
            --staged-upload-out-dir platform-evidence-upload/linux-i386/${{ inputs.release_tag }} \
            --runner-label self-hosted \
            --runner-label linux \
            --runner-label i386 \
            --out platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/artifacts/platform-verified-evidence-linux-i386.json
      - name: Package Linux i386 review evidence bundle
        run: |
          set -euo pipefail
          . .venv-native/bin/activate
          python scripts/make_extended_linux_evidence_bundle.py \
            --target linux-i386 \
            --release-tag "${{ inputs.release_tag }}" \
            --assets-dir platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/artifacts \
            --builder-evidence platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/builder-identity-linux-i386.json \
            --smoke-evidence platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/native-smoke-linux-i386.log \
            --candidate-record platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/artifacts/platform-verified-evidence-linux-i386.json \
            --out-dir platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/artifacts
      - name: Finalize Linux i386 accepted-evidence candidate
        run: |
          set -euo pipefail
          . .venv-native/bin/activate
          python scripts/finalize_platform_verified_evidence_record.py \
            --candidate-record platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/artifacts/platform-verified-evidence-linux-i386.json \
            --bundle-manifest platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/artifacts/extended-linux-evidence-bundle-linux-i386-${{ inputs.release_tag }}.json \
            --bundle-archive platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/artifacts/extended-linux-evidence-bundle-linux-i386-${{ inputs.release_tag }}.zip \
            --bundle-sha256s platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/artifacts/extended-linux-evidence-bundle-linux-i386-${{ inputs.release_tag }}-SHA256SUMS.txt \
            --out platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/artifacts/platform-verified-evidence-linux-i386-final.json
      - name: Stage scoped Linux i386 evidence upload
        run: |
          set -euo pipefail
          . .venv-native/bin/activate
          python scripts/stage_extended_linux_evidence_upload.py \
            --target linux-i386 \
            --release-tag "${{ inputs.release_tag }}" \
            --source-dir platform-evidence-staging/linux-i386/${{ inputs.release_tag }}/artifacts \
            --out-dir platform-evidence-upload/linux-i386/${{ inputs.release_tag }} \
            --force
      - uses: actions/upload-artifact@v7
        with:
          name: extended-linux-evidence-linux-i386-${{ inputs.release_tag }}
          path: platform-evidence-upload/linux-i386/${{ inputs.release_tag }}/*
          if-no-files-found: error
          include-hidden-files: false
          retention-days: 90

  linux-armhf-native-evidence:
    if: ${{ inputs.target == 'linux-armhf' }}
    runs-on: [self-hosted, linux, armhf]
    timeout-minutes: 90
    env:
      RELEASE_TAG: ${{ inputs.release_tag }}
    steps:
