          cp native-dist/linux/remote-ops-workspace-${{ inputs.release_tag }}-linux-armhf-native-manifest.json platform-evidence-staging/linux-armhf/${{ inputs.release_tag }}/artifacts/
          cp native-dist/linux/remote-ops-workspace-${{ inputs.release_tag }}-linux-armhf-native-SHA256SUMS.txt platform-evidence-staging/linux-armhf/${{ inputs.release_tag }}/artifacts/
      - name: Validate Linux armhf promotion artifacts
        run: |
          set -euo pipefail
          . .venv-native/bin/activate
          python scripts/check_platform_promotion_artifacts.py --target linux-armhf --assets-dir platform-evidence-staging/linux-armhf/${{ inputs.release_tag }}/artifacts --tag "${{ inputs.release_tag }}" --strict
      - name: Preflight Linux armhf local platform goal evidence
        run: |
          set -euo pipefail
          . .venv-native/bin/activate
          python scripts/check_platform_goal_local_evidence.py \
            --root platform-evidence-staging \
            --release-tag "${{ inputs.release_tag }}" \
            --target linux-armhf \
            --assets-dir platform-evidence-staging/linux-armhf/${{ inputs.release_tag }}/artifacts \
            --linux-builder-evidence platform-evidence-staging/linux-armhf/${{ inputs.release_tag }}/builder-identity-linux-armhf.json \
            --linux-smoke-evidence platform-evidence-staging/linux-armhf/${{ inputs.release_tag }}/native-smoke-linux-armhf.log \
            --linux-workflow-run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
