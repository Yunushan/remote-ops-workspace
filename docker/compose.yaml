services:
  remote-ops-web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    ports:
      - "127.0.0.1:8765:8765"
    environment:
      ROW_HOME: /data
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    volumes:
      - remote-ops-data:/data
volumes:
  remote-ops-data:
