name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  repo-policy:
    name: Repository policy and lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_CACHE_DIR: "1"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install Qt headless runtime dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1
      - name: Install policy verification dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Dependency vulnerability audit
        run: >-
          python -c "import truststore; truststore.inject_into_ssl(); from pip_audit._cli import audit; audit()"
          --strict --no-deps --disable-pip -r requirements-release.txt
      - name: Verify repository policy
        run: python scripts/verify.py --quick
      - name: Ruff lint
        run: python -m ruff check src tests scripts

  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025-vs2026, macos-15-intel]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - os: macos-26-intel
            python-version: "3.12"
          - os: macos-26-intel
            python-version: "3.13"
          - os: macos-26-intel
            python-version: "3.14"
          - os: macos-14
            python-version: "3.12"
          - os: macos-14
            python-version: "3.13"
          - os: macos-14
            python-version: "3.14"
          - os: macos-15
            python-version: "3.12"
          - os: macos-15
            python-version: "3.13"
          - os: macos-15
            python-version: "3.14"
          - os: macos-26
            python-version: "3.12"
          - os: macos-26
            python-version: "3.13"
          - os: macos-26
            python-version: "3.14"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Purge pip cache
        run: python -m pip cache purge
        continue-on-error: true
      - name: Install
        env:
          PIP_NO_CACHE_DIR: "1"
        run: |
          python -m pip install -e ".[security,dev]"
      - name: Pytest
        run: python -m pytest -q

  mobile-web:
    name: Mobile Web/PWA contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install mobile web verification dependencies
        run: python -m pip install -e ".[dev]"
      - name: Android and iOS Web/PWA smoke
        run: python -m pytest tests/test_web_hardening.py tests/test_platform_targets.py tests/test_platform_support_truth.py tests/test_mobile_support.py

  web-container:
    name: Web/PWA container smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          persist-credentials: false
      - name: Build and smoke-test Web/PWA container
        shell: bash
        run: |
          set -euo pipefail
          compose() { docker compose -p row-web-smoke -f docker/compose.yaml "$@"; }
          cleanup() { compose down --volumes --remove-orphans; }
          trap cleanup EXIT
          compose up --detach --build
          healthy=false
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error http://127.0.0.1:8765/healthz; then
              healthy=true
              break
            fi
            sleep 1
          done
          if [[ "$healthy" != true ]]; then
            compose logs
            exit 1
          fi
          container_id="$(compose ps -q remote-ops-web)"
          test -n "$container_id"
          test "$(docker inspect --format '{{.Config.User}}' "$container_id")" = "10001:10001"
          test "$(docker inspect --format '{{.HostConfig.ReadonlyRootfs}}' "$container_id")" = "true"
          test "$(docker inspect --format '{{.HostConfig.PidsLimit}}' "$container_id")" = "128"
          docker inspect --format '{{.HostConfig.CapDrop}}' "$container_id" | grep -Fx "[ALL]"
          docker inspect --format '{{.HostConfig.SecurityOpt}}' "$container_id" | grep -Fx "[no-new-privileges:true]"
          compose exec -T remote-ops-web sh -c 'test -w /data && touch /data/.row-write-smoke && rm /data/.row-write-smoke'

  android-emulator-web:
    name: Android Web/PWA emulator API ${{ matrix.api-level }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        api-level: [31, 32, 33, 34, 35, 36]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install mobile verification dependencies
        run: python -m pip install -e ".[dev]"
      - name: Static mobile contract checks
        run: python -m pytest tests/test_web_hardening.py tests/test_mobile_support.py
      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Configure Android SDK command-line tools
        run: |
          set -euo pipefail
          sdk_root="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
          sdk_tools="$sdk_root/cmdline-tools/latest/bin"
          if [[ ! -x "$sdk_tools/sdkmanager" || ! -x "$sdk_tools/avdmanager" ]]; then
            echo "::error::Android SDK command-line tools not found under $sdk_tools"
            find "$sdk_root" -maxdepth 4 -type f \( -name sdkmanager -o -name avdmanager \) -print || true
            exit 1
          fi
          avd_home="${RUNNER_TEMP:-$HOME}/android-avd"
          mkdir -p "$avd_home"
          echo "ANDROID_HOME=$sdk_root" >> "$GITHUB_ENV"
          echo "ANDROID_SDK_ROOT=$sdk_root" >> "$GITHUB_ENV"
          echo "ANDROID_AVD_HOME=$avd_home" >> "$GITHUB_ENV"
          echo "$sdk_tools" >> "$GITHUB_PATH"
          echo "$sdk_root/emulator" >> "$GITHUB_PATH"
          echo "$sdk_root/platform-tools" >> "$GITHUB_PATH"
          "$sdk_tools/sdkmanager" --version
      - name: Install Android emulator image
        shell: bash
        run: |
          set -euo pipefail
          packages=(
            "platform-tools"
            "emulator"
            "platforms;android-${{ matrix.api-level }}"
            "system-images;android-${{ matrix.api-level }};google_apis;x86_64"
          )
          accept_sdk_licenses() {
            set +o pipefail
            yes | sdkmanager --licenses
            license_status=$?
            set -o pipefail
            return "$license_status"
          }
          for attempt in 1 2 3; do
            if accept_sdk_licenses && sdkmanager --install "${packages[@]}"; then
              exit 0
            fi
            if [[ "$attempt" == "3" ]]; then
              break
            fi
            echo "::warning::Android SDK package installation failed on attempt $attempt; removing transient cache and incomplete API ${{ matrix.api-level }} system image before retrying"
            rm -rf "${ANDROID_USER_HOME:-$HOME/.android}/cache" \
              "$ANDROID_HOME/system-images/android-${{ matrix.api-level }}/google_apis/x86_64"
            sleep "$((attempt * 10))"
          done
          echo "::error::Android SDK package installation failed after 3 attempts"
          exit 1
      - name: Create Android virtual device
        run: |
          set -euo pipefail
          echo no | avdmanager create avd -n row-api-${{ matrix.api-level }} -k "system-images;android-${{ matrix.api-level }};google_apis;x86_64" --device "pixel_6"
          avdmanager list avd
          if ! emulator -list-avds | grep -Fx "row-api-${{ matrix.api-level }}"; then
            echo "::error::Android AVD row-api-${{ matrix.api-level }} was not created under ANDROID_AVD_HOME=$ANDROID_AVD_HOME"
            find "${ANDROID_AVD_HOME:-$HOME/.android/avd}" -maxdepth 2 -type f -print || true
            exit 1
          fi
      - name: Start Web/PWA server
        run: |
          python -m http.server 8765 --directory apps/web > web-server.log 2>&1 &
          echo $! > web-server.pid
      - name: Boot Android emulator
        timeout-minutes: 8
        run: |
          set -euo pipefail
          emulator -list-avds
          if ! emulator -list-avds | grep -Fx "row-api-${{ matrix.api-level }}"; then
            echo "::error::Android AVD row-api-${{ matrix.api-level }} missing before emulator boot; ANDROID_AVD_HOME=$ANDROID_AVD_HOME"
            find "${ANDROID_AVD_HOME:-$HOME/.android/avd}" -maxdepth 2 -type f -print || true
            exit 1
          fi
          nohup emulator -avd row-api-${{ matrix.api-level }} -no-window -gpu swiftshader_indirect -no-snapshot -no-snapshot-load -no-snapshot-save -noaudio -no-boot-anim -camera-back none -no-metrics > emulator.log 2>&1 &
          emulator_pid=$!
          echo "$emulator_pid" > emulator.pid
          deadline=$((SECONDS + 180))
          until adb devices | awk 'NR > 1 && $2 == "device" { found = 1 } END { exit found ? 0 : 1 }'; do
            if ! kill -0 "$emulator_pid" 2>/dev/null; then
              echo "::error::Android emulator process exited before adb connection"
              tail -200 emulator.log || true
              exit 1
            fi
            if (( SECONDS >= deadline )); then
              echo "::error::Android emulator did not appear in adb devices within 180 seconds"
              adb devices -l || true
              tail -200 emulator.log || true
              exit 1
            fi
            sleep 5
          done
          if ! timeout 180 bash -c 'until [[ "$(adb shell getprop sys.boot_completed | tr -d "\r")" == "1" ]]; do sleep 5; done'; then
            echo "::error::Android emulator did not complete boot within 180 seconds"
            adb devices -l || true
            adb shell getprop || true
            tail -200 emulator.log || true
            exit 1
          fi
          adb shell input keyevent 82 || true
      - name: Android Web/PWA emulator smoke
        run: python scripts/check_mobile_emulator_smoke.py --platform android --android-api ${{ matrix.api-level }} --url http://10.0.2.2:8765/index.html --out-dir artifacts/mobile
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: android-web-pwa-api-${{ matrix.api-level }}
          path: artifacts/mobile
          if-no-files-found: error

  ios-simulator-web:
    name: iOS Web/PWA simulator
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install mobile verification dependencies
        run: python -m pip install -e ".[dev]"
      - name: Static mobile contract checks
        run: python -m pytest tests/test_web_hardening.py tests/test_mobile_support.py
      - name: Start Web/PWA server
        run: |
          WEB_PWA_PORT="$(python - <<'PY'
          import socket

          with socket.socket() as sock:
              sock.bind(("127.0.0.1", 0))
              print(sock.getsockname()[1])
          PY
          )"
          export WEB_PWA_URL="http://127.0.0.1:${WEB_PWA_PORT}/index.html"
          echo "WEB_PWA_URL=$WEB_PWA_URL" >> "$GITHUB_ENV"
          python -m http.server "$WEB_PWA_PORT" --directory apps/web --bind 127.0.0.1 > web-server.log 2>&1 &
          echo $! > web-server.pid
          python - <<'PY'
          import os
          import time
          from pathlib import Path
          import urllib.request

          deadline = time.monotonic() + 90
          last_error = ""
          while time.monotonic() < deadline:
              try:
                  with urllib.request.urlopen(os.environ["WEB_PWA_URL"], timeout=3) as response:
                      if response.status < 500:
                          raise SystemExit(0)
                      last_error = f"HTTP {response.status}"
              except Exception as exc:
                  last_error = str(exc)
              time.sleep(1)
          try:
              log_tail = Path("web-server.log").read_text(encoding="utf-8", errors="replace")[-4000:]
          except OSError as exc:
              log_tail = f"<could not read web-server.log: {exc}>"
          raise SystemExit(
              "Web/PWA server did not become reachable before iOS simulator smoke: "
              f"{last_error}\nweb-server.log:\n{log_tail}"
          )
          PY
      - name: iOS Web/PWA simulator smoke
        run: python scripts/check_mobile_emulator_smoke.py --platform ios --url "$WEB_PWA_URL" --ios-open-url-attempts 3 --out-dir artifacts/mobile
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ios-web-pwa-simulator
          path: artifacts/mobile
          if-no-files-found: error

  gui-render:
    name: Real PyQt6 GUI render
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_CACHE_DIR: "1"
      QT_QPA_PLATFORM: "offscreen"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install Linux Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fontconfig \
            fonts-dejavu-core \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxext6 \
            libxrender1
      - name: Verify Linux GUI font discovery
        run: |
          fc-cache -f
          fc-match "DejaVu Sans"
          fc-list : family | grep -q .
      - name: Install desktop verification dependencies
        run: python -m pip install -e ".[desktop,security,dev]"
      - name: Real GUI render smoke
        timeout-minutes: 8
        run: python scripts/check_real_gui_render.py --require-pyqt6 --timeout-seconds 240 --out-dir artifacts/gui-real
      - name: Validate real GUI render artifact
        timeout-minutes: 2
        run: python scripts/check_real_gui_render_artifact.py --artifact-dir artifacts/gui-real
      - name: Exercise GUI controls and responsive layouts
        timeout-minutes: 5
        run: python scripts/check_gui_interactions.py --require-pyqt6 --out-dir artifacts/gui-interactions
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gui-real-render
          path: artifacts/gui-real/*
          if-no-files-found: error
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gui-interactions-linux-offscreen
          path: artifacts/gui-interactions/*
          if-no-files-found: error

  gui-interactions-windows:
    name: Native Windows PyQt6 render and interactions
    runs-on: windows-2025-vs2026
    timeout-minutes: 20
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_CACHE_DIR: "1"
      QT_QPA_PLATFORM: "windows"
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install desktop verification dependencies
        run: python -m pip install -e ".[desktop,security,dev]"
      - name: Verify real Windows ConPTY terminal transport
        timeout-minutes: 5
        run: python -m pytest -q tests/test_windows_conpty.py tests/test_qt_terminal_process.py
      - name: Render full GUI on native Windows
        timeout-minutes: 8
        run: python scripts/check_real_gui_render.py --require-pyqt6 --timeout-seconds 240 --out-dir artifacts/gui-real-windows
      - name: Validate native Windows GUI render artifact
        timeout-minutes: 2
        run: python scripts/check_real_gui_render_artifact.py --artifact-dir artifacts/gui-real-windows
      - name: Exercise native Windows controls and responsive layouts
        timeout-minutes: 8
        run: python scripts/check_gui_interactions.py --require-pyqt6 --out-dir artifacts/gui-interactions-windows
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gui-real-render-windows
          path: artifacts/gui-real-windows/*
          if-no-files-found: error
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gui-interactions-windows
          path: artifacts/gui-interactions-windows/*
          if-no-files-found: error
